<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Game Uang Rupiah - Multi Level</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f0f8ff;
      text-align: center;
      padding: 20px;
    }
    .btn {
      background-color: #1976d2;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
    }
    .gameWrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .dragDropVertical {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .dragContainer, .dropContainer {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .money, .item {
      width: 250px;
      cursor: grab;
    }
    .dropzone {
      width: 180px;
      min-height: 100px;
      border: 2px dashed #555;
      border-radius: 10px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #e0f7fa;
      flex-direction: column;
      transition: background-color 0.3s ease;
    }
    .correct {
      background-color: #c8e6c9 !important;
      color: green !important;
    }
    .wrong {
      background-color: #ffcdd2 !important;
      color: red !important;
    }
    #instruction {
      font-size: 18px;
      margin-top: 10px;
      color: #444;
    }
    .fade {
      animation: fadein 1s ease;
    }
    @keyframes fadein {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .dropzone-label {
      font-weight: bold;
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <h1>💵Ceria Mart💵</h1>
  <div id="levelMenu">
    <p>Pilih:</p>
    <button class="btn" onclick="startLevel('A')"> A - Cocokkan Uang</button>
    <button class="btn" id="btnB" onclick="startLevel('B')" disabled>🔒 B - Hitung Jumlah</button>
    <button class="btn" id="btnC" onclick="startLevel('C')" disabled>🔒 C - Belanja</button>
  </div>
  <p id="instruction"></p>
  <p id="score">Skor: 0</p>
  <button class="btn" onclick="resetGame()">🔄 Mulai Ulang</button>
  <div id="gameContainer" class="gameWrapper"></div>
  <audio id="audioBenar" src="benar.mp3" preload="auto"></audio>
  <audio id="audioSalah" src="salah.mp3" preload="auto"></audio>
  <script>
    let score = 0;
    let currentLevel = 'A';
    let correctCount = 0;
    let expectedCorrect = 0;

    const uang = [
      { id: "1000", src: "1000.jpg", label: "Rp1.000", nilai: 1000 },
      { id: "2000", src: "2000.jpg", label: "Rp2.000", nilai: 2000 },
      { id: "5000", src: "5000.jpg", label: "Rp5.000", nilai: 5000 },
      { id: "10000", src: "10000.jpg", label: "Rp10.000", nilai: 10000 },
      { id: "20000", src: "20000.jpg", label: "Rp20.000", nilai: 20000 }
    ];

    const soal = [
      { soal: "Rp2.000 + Rp5.000", jawaban: 7000 },
      { soal: "Rp10.000 - Rp2.000", jawaban: 8000 },
      { soal: "Rp5.000 + Rp1.000", jawaban: 6000 },
      { soal: "Rp20.000 - Rp10.000", jawaban: 10000 },
      { soal: "Rp1.000 + Rp2.000", jawaban: 3000 }
    ];

    const itemsLevelC = [
      { id: "apel", label: "Apel: Rp5.000", harga: 5000, src: "apel.jpg" },
      { id: "wortel", label: "Wortel: Rp2.000", harga: 2000, src: "wortel.jpg" },
      { id: "sawi", label: "Sawi: Rp1.000", harga: 1000, src: "sawi.jpg" },
      { id: "timun", label: "Timun: Rp3.000", harga: 3000, src: "timun.jpg" },
      { id: "kangkung", label: "Kangkung: Rp1.000", harga: 1000, src: "kangkung.jpg" },
      { id: "kol", label: "Kol: Rp4.000", harga: 4000, src: "kol.jpg" },
      { id: "jeruk", label: "Jeruk: Rp2.000", harga: 2000, src: "jeruk.jpg" },
      { id: "pisang", label: "Pisang: Rp1.000", harga: 1000, src: "pisang.jpg" },
      { id: "bayam", label: "Bayam: Rp1.000", harga: 1000, src: "bayam.jpg" },
      { id: "tomat", label: "Tomat: Rp2.000", harga: 2000, src: "tomat.jpg" }
    ];

    function playSound(correct) {
      const audio = document.getElementById(correct ? "audioBenar" : "audioSalah");
      if (audio) {
        audio.currentTime = 0;
        audio.play().catch(e => console.warn("Sound play error:", e));
      }
    }

    function updateScore() {
      score += 10;
      document.getElementById("score").textContent = `Skor: ${score}`;
    }

    function resetGame() {
      document.getElementById("levelMenu").style.display = "block";
      document.getElementById("gameContainer").innerHTML = "";
      document.getElementById("instruction").textContent = "";
      document.getElementById("score").textContent = "Skor: 0";
      localStorage.setItem('levelBUnlocked', 'false');
      localStorage.setItem('levelCUnlocked', 'false');
      window.onload = () => {
        updateLevelButtons();};
      score = 0;
      correctCount = 0;
      expectedCorrect = 0;
    }
    
    function updateLevelButtons() {
    const btnB = document.getElementById("btnB");
    const btnC = document.getElementById("btnC");
    btnB.disabled = localStorage.getItem("levelBUnlocked") !== "true";
    btnB.textContent = btnB.disabled ? "🔒 B - Hitung Jumlah" : "B - Hitung Jumlah";
    btnC.disabled = localStorage.getItem("levelCUnlocked") !== "true";
    btnC.textContent = btnC.disabled ? "🔒 C - Belanja" : "C - Belanja";
    }

    function transitionToNextLevel(nextLevel) {
      const overlay = document.createElement("div");
      overlay.style.position = "fixed";
      overlay.style.top = 0;
      overlay.style.left = 0;
      overlay.style.width = "100%";
      overlay.style.height = "100%";
      overlay.style.background = "rgba(0,0,0,0.7)";
      overlay.style.display = "flex";
      overlay.style.justifyContent = "center";
      overlay.style.alignItems = "center";
      overlay.style.color = "white";
      overlay.style.fontSize = "24px";
      overlay.textContent = `Yey, ${currentLevel} selesai! Kamu hebat! Lanjut ke ${nextLevel}...`;
      document.body.appendChild(overlay);
      function transitionToNextLevel(nextLevel)
      {
      if (nextLevel === 'B') localStorage.setItem('levelBUnlocked', 'true');
      if (nextLevel === 'C') localStorage.setItem('levelCUnlocked', 'true');
  // ...
      }


      setTimeout(() => {
        document.body.removeChild(overlay);
        startLevel(nextLevel);
      }, 2000);
    }

    function checkLevelCompletion() {
  console.log("Cek level selesai:", correctCount, expectedCorrect, currentLevel);
  
  if (correctCount === expectedCorrect) {
    setTimeout(() => {
      if (currentLevel === 'A') {
        transitionToNextLevel('B');
      } else if (currentLevel === 'B') {
        transitionToNextLevel('C');
      } else if (currentLevel === 'C') {
        const overlay = document.createElement("div");
        overlay.style.position = "fixed";
        overlay.style.top = 0;
        overlay.style.left = 0;
        overlay.style.width = "100%";
        overlay.style.height = "100%";
        overlay.style.background = "rgba(0,0,0,0.7)";
        overlay.style.display = "flex";
        overlay.style.justifyContent = "center";
        overlay.style.alignItems = "center";
        overlay.style.color = "white";
        overlay.style.fontSize = "24px";
        overlay.textContent = `🎉 Kamu telah menyelesaikan semua level! Kembali ke menu utama...`;
        document.body.appendChild(overlay);

        setTimeout(() => {
          document.body.removeChild(overlay);
          resetGame(); // kembali ke menu utama
        }, 2500);
      }
    }, 800);
  }
}


    function startLevel(level) {
  const container = document.getElementById("gameContainer");
  const instruction = document.getElementById("instruction");
  container.innerHTML = "";
  correctCount = 0;
  document.getElementById("score").textContent = `Skor: ${score}`;
  const dragContainer = document.createElement("div");
  dragContainer.className = "dragContainer";
  const dropContainer = document.createElement("div");
  dropContainer.className = "dropContainer";
  container.appendChild(dragContainer);
  container.appendChild(dropContainer);

  if (level === 'A') {
  const acakBtn = document.createElement("button");
  acakBtn.className = "btn";
  acakBtn.textContent = "🔀 Acak Gambar";
  acakBtn.onclick = () => startLevel('A');
  container.insertBefore(acakBtn, dragContainer);
  currentLevel = 'A';
  instruction.textContent = "Seret gambar uang ke kotak soal sesuai hasil perhitungan.";

  const shuffledImages = uang.slice().sort(() => 0.5 - Math.random()); // Untuk gambar
  const shuffledLabels = uang.slice().sort(() => 0.5 - Math.random()); // Untuk dropzone

  expectedCorrect = uang.length;

  // Tambahkan gambar uang acak
  shuffledImages.forEach(item => {
    const img = document.createElement("img");
    img.src = item.src;
    img.className = "money";
    img.id = item.id;
    img.draggable = true;
    img.ondragstart = e => e.dataTransfer.setData("text", item.id);
    dragContainer.appendChild(img);
  });

  // Tambahkan dropzone acak
  shuffledLabels.forEach(item => {
    const drop = document.createElement("div");
    drop.className = "dropzone";
    drop.textContent = item.label;
    drop.dataset.id = item.id;
    drop.ondragover = e => e.preventDefault();
    drop.ondrop = e => {
      const dropped = e.dataTransfer.getData("text");
      if (dropped === item.id) {
        drop.classList.add("correct");
        document.getElementById(dropped).style.display = "none";
        updateScore();
        playSound(true);
        correctCount++;
        checkLevelCompletion();
      } else {
        drop.classList.add("wrong");
        playSound(false);
        setTimeout(() => drop.classList.remove("wrong"), 1000);
      }
    };
    dropContainer.appendChild(drop);
  });
}

  else if (level === 'B') {
    const acakBtn = document.createElement("button");
    acakBtn.className = "btn";
    acakBtn.textContent = "🔀 Acak Soal";
    acakBtn.onclick = () => startLevel('B');
    container.insertBefore(acakBtn, dragContainer);
    currentLevel = 'B';
    instruction.textContent = "Seret gambar uang ke dalam kotak sesuai hasil.";
    const shuffled = soal.slice().sort(() => 0.5 - Math.random()).slice(0, 2);
    expectedCorrect = shuffled.length;
    shuffled.forEach((s, i) => {
      const drop = document.createElement("div");
      drop.className = "dropzone";
      drop.id = `drop-b-${i}`;
      drop.textContent = s.soal;
      drop.dataset.total = 0;
      drop.dataset.jawaban = s.jawaban;
      drop.dataset.usedUang = JSON.stringify([]);

      const totalLabel = document.createElement("div");
      totalLabel.style.fontWeight = "bold";
      totalLabel.textContent = "Total: Rp0";
      drop.appendChild(totalLabel);

      drop.ondragover = e => e.preventDefault();
      drop.ondrop = e => {
        const id = e.dataTransfer.getData("text");
        const nilai = uang.find(u => u.id === id)?.nilai;
        const used = JSON.parse(drop.dataset.usedUang);

    if (!nilai || used.includes(id)) return;

      drop.dataset.total = parseInt(drop.dataset.total) + nilai;
      used.push(id);
      drop.dataset.usedUang = JSON.stringify(used);
      totalLabel.textContent = `Total: Rp${drop.dataset.total}`;

    if (parseInt(drop.dataset.total) === parseInt(drop.dataset.jawaban)) {
      drop.classList.add("correct");
        updateScore();
        playSound(true);
        correctCount++;
        checkLevelCompletion();
    } else if (parseInt(drop.dataset.total) > parseInt(drop.dataset.jawaban)) {
    // Reset dropzone
      drop.classList.add("wrong");
      playSound(false);
      setTimeout(() => {
      drop.classList.remove("wrong");
      drop.dataset.total = 0;
      drop.dataset.usedUang = JSON.stringify([]);
      totalLabel.textContent = "Total: Rp0";

      // Tampilkan ulang semua uang yang digunakan sebelumnya
      used.forEach(uid => {
        const img = document.getElementById(uid);
        if (img) img.style.display = "inline";
        });
        }, 1000);
      }
    };

      dropContainer.appendChild(drop);
    });

    uang.forEach(item => {
    const img = document.createElement("img");
    img.src = item.src;
    img.className = "money";
    img.id = item.id;
    img.draggable = true;
    img.ondragstart = e => e.dataTransfer.setData("text", item.id);
    dragContainer.appendChild(img);
    });
  }

  else if (level === 'C') {
    const selesaiBtn = document.createElement("button");
    selesaiBtn.className = "btn";
    selesaiBtn.textContent = "✅ Selesai Belanja";
    selesaiBtn.onclick = function () {
      if (this.disabled) return; // Cegah klik berulang
      const total = parseInt(keranjang.dataset.total);
      if (total > 0) {
      this.disabled = true; // Nonaktifkan tombol
      preparePembayaranLevelC(total);
      } else {
      alert("Belanja dulu sebelum membayar!");
    }
  };

    container.insertBefore(selesaiBtn, dragContainer);
    currentLevel = 'C';
    instruction.textContent = "Seret barang ke keranjang. Setelah itu, bayar sesuai jumlah harga.";
    expectedCorrect = 1;
    correctCount = 0;

    const keranjang = document.createElement("div");
    keranjang.className = "dropzone";
    keranjang.textContent = "Keranjang Belanja";
    keranjang.dataset.total = 0;
    keranjang.dataset.usedItems = JSON.stringify([]);
    dropContainer.appendChild(keranjang);

    itemsLevelC.forEach(item => {
      const wrapper = document.createElement("div");
      wrapper.style.display = "flex";
      wrapper.style.flexDirection = "column";
      wrapper.style.alignItems = "center";

      const img = document.createElement("img");
      img.src = item.src;
      img.className = "item";
      img.id = item.id;
      img.draggable = true;
      img.ondragstart = e => e.dataTransfer.setData("text", item.id);

      const label = document.createElement("div");
      label.textContent = item.label;
      wrapper.appendChild(img);
      wrapper.appendChild(label);
      dragContainer.appendChild(wrapper);
    });

    keranjang.ondragover = e => e.preventDefault();
    keranjang.ondrop = e => {
      const dropped = e.dataTransfer.getData("text");
      const item = itemsLevelC.find(i => i.id === dropped);
      const used = JSON.parse(keranjang.dataset.usedItems);
      if (item && !used.includes(dropped)) {
        used.push(dropped);
        keranjang.dataset.usedItems = JSON.stringify(used);
        keranjang.dataset.total = parseInt(keranjang.dataset.total) + item.harga;
        document.getElementById(dropped).style.display = "none";
        if (used.length === itemsLevelC.length) {
          setTimeout(() => preparePembayaranLevelC(parseInt(keranjang.dataset.total)), 500);
        }
        updateScore();
        playSound(true);
      } else {
        playSound(false);
      }
    };
    }
  }

  function preparePembayaranLevelC(totalBelanja) {
  const container = document.getElementById("gameContainer");

  const pembayaranContainer = document.createElement("div");
  pembayaranContainer.className = "dragDropVertical";

  const infoTotal = document.createElement("p");
  infoTotal.style.fontWeight = "bold";
  infoTotal.textContent = `Total Belanja: Rp${totalBelanja}`;
  pembayaranContainer.appendChild(infoTotal);

  const uangContainer = document.createElement("div");
  uangContainer.className = "dragContainer";

  uang.forEach(item => {
    const img = document.createElement("img");
    img.src = item.src;
    img.className = "money";
    img.id = item.id;
    img.draggable = true;
    img.ondragstart = e => e.dataTransfer.setData("text", item.id);
    uangContainer.appendChild(img);
  });

  const drop = document.createElement("div");
  drop.className = "dropzone";
  drop.textContent = "Bayar di sini";
  drop.dataset.total = 0;

  const totalLabel = document.createElement("div");
  totalLabel.style.fontWeight = "bold";
  totalLabel.style.marginTop = "5px";
  totalLabel.textContent = "Total: Rp0";
  drop.appendChild(totalLabel);

  drop.ondragover = e => e.preventDefault();
  drop.ondrop = e => {
    const id = e.dataTransfer.getData("text");
    console.log("Dropped ID:", id);
    const nilai = uang.find(u => u.id === id)?.nilai;
    console.log("Nilai ditemukan:", nilai);
    if (!nilai) return;

    drop.dataset.total = parseInt(drop.dataset.total) + nilai;
    totalLabel.textContent = `Total: Rp${drop.dataset.total}`;

    if (parseInt(drop.dataset.total) === totalBelanja) {
      drop.classList.add("correct");
      updateScore();
      playSound(true);
      alert("🎉 Pembayaran berhasil!");
      
      correctCount++;
      checkLevelCompletion();
    } else if (parseInt(drop.dataset.total) > totalBelanja) {
      drop.classList.add("wrong");
      playSound(false);
      setTimeout(() => drop.classList.remove("wrong"), 1000);
    }
  };

  pembayaranContainer.appendChild(uangContainer);
  pembayaranContainer.appendChild(drop);
  container.appendChild(pembayaranContainer);
}
</script>
</body>
</html>
